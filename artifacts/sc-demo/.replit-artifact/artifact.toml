kind = "web"
previewPath = "/"
title = "S&C Project Demo"
version = "1.0.0"
id = "artifacts/sc-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23037

[services.development]
run = "pnpm --filter @workspace/sc-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sc-demo", "run", "build" ]
publicDir = "artifacts/sc-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23037"
BASE_PATH = "/"
