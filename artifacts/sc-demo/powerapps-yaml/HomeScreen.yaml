Screens:
  HomeScreen:
    Properties:
      Fill: =RGBA(248, 250, 252, 1)

    Children:

      # ── Top navigation bar ─────────────────────────────────────────
      NavBar:
        Control: Rectangle
        Properties:
          X: =0
          Y: =0
          Width: =Parent.Width
          Height: =56
          Fill: =RGBA(26, 53, 87, 1)      # navy #1a3557

      NavBarTitle:
        Control: Label
        Properties:
          X: =20
          Y: =0
          Width: =300
          Height: =56
          Text: ="S&C Project Management"
          Color: =RGBA(255, 255, 255, 1)
          Size: =15
          FontWeight: =FontWeight.Bold

      # ── Page heading ───────────────────────────────────────────────
      WelcomeHeading:
        Control: Label
        Properties:
          X: =40
          Y: =80
          Width: =Parent.Width - 80
          Height: =36
          Text: ="Welcome back, John."
          Color: =RGBA(15, 23, 42, 1)
          Size: =22
          FontWeight: =FontWeight.Bold

      WelcomeSubtitle:
        Control: Label
        Properties:
          X: =40
          Y: =118
          Width: =Parent.Width - 80
          Height: =24
          Text: ="Here is your quick access panel for today."
          Color: =RGBA(100, 116, 139, 1)
          Size: =13

      # ── Card 1 — Set Up New Project ────────────────────────────────
      Card1Background:
        Control: Rectangle
        Properties:
          X: =40
          Y: =164
          Width: =(Parent.Width - 120) / 3
          Height: =200
          Fill: =RGBA(255, 255, 255, 1)
          BorderColor: =RGBA(226, 232, 240, 1)
          BorderThickness: =1
          RadiusBottomLeft: =12
          RadiusBottomRight: =12
          RadiusTopLeft: =12
          RadiusTopRight: =12

      Card1IconBg:
        Control: Rectangle
        Properties:
          X: =56
          Y: =180
          Width: =48
          Height: =48
          Fill: =RGBA(255, 251, 235, 1)     # amber-50
          RadiusBottomLeft: =8
          RadiusBottomRight: =8
          RadiusTopLeft: =8
          RadiusTopRight: =8

      Card1Badge:
        Control: Label
        Properties:
          X: =92
          Y: =176
          Width: =20
          Height: =20
          Text: ="3"
          Color: =RGBA(255, 255, 255, 1)
          Fill: =RGBA(245, 158, 11, 1)      # amber-500
          Size: =10
          FontWeight: =FontWeight.Bold
          Align: =Align.Center
          RadiusBottomLeft: =10
          RadiusBottomRight: =10
          RadiusTopLeft: =10
          RadiusTopRight: =10

      Card1Title:
        Control: Label
        Properties:
          X: =56
          Y: =240
          Width: =Card1Background.Width - 32
          Height: =28
          Text: ="Set Up New Project"
          Color: =RGBA(15, 23, 42, 1)
          Size: =15
          FontWeight: =FontWeight.Semibold

      Card1Subtitle:
        Control: Label
        Properties:
          X: =56
          Y: =268
          Width: =Card1Background.Width - 32
          Height: =60
          Text: ="Complete EPMP charter data for newly picked-up projects awaiting BA setup."
          Color: =RGBA(100, 116, 139, 1)
          Size: =12

      Card1Link:
        Control: Label
        Properties:
          X: =56
          Y: =338
          Width: =Card1Background.Width - 32
          Height: =24
          Text: ="View setup queue →"
          Color: =RGBA(217, 119, 6, 1)     # amber-600
          Size: =12
          FontWeight: =FontWeight.Semibold

      Card1Button:
        Control: Button
        Properties:
          X: =Card1Background.X
          Y: =Card1Background.Y
          Width: =Card1Background.Width
          Height: =Card1Background.Height
          Text: =""
          Fill: =RGBA(0, 0, 0, 0)
          HoverFill: =RGBA(0, 0, 0, 0.03)
          BorderColor: =RGBA(0, 0, 0, 0)
          OnSelect: |
            // Navigate(SetupQueueScreen)
            false

      # ── Card 2 — Process Funding Request ───────────────────────────
      Card2Background:
        Control: Rectangle
        Properties:
          X: =40 + (Parent.Width - 120) / 3 + 20
          Y: =164
          Width: =(Parent.Width - 120) / 3
          Height: =200
          Fill: =RGBA(255, 255, 255, 1)
          BorderColor: =RGBA(226, 232, 240, 1)
          BorderThickness: =1
          RadiusBottomLeft: =12
          RadiusBottomRight: =12
          RadiusTopLeft: =12
          RadiusTopRight: =12

      Card2IconBg:
        Control: Rectangle
        Properties:
          X: =Card2Background.X + 16
          Y: =180
          Width: =48
          Height: =48
          Fill: =RGBA(238, 242, 255, 1)    # indigo-50
          RadiusBottomLeft: =8
          RadiusBottomRight: =8
          RadiusTopLeft: =8
          RadiusTopRight: =8

      Card2Title:
        Control: Label
        Properties:
          X: =Card2Background.X + 16
          Y: =240
          Width: =Card2Background.Width - 32
          Height: =28
          Text: ="Process Funding Request"
          Color: =RGBA(15, 23, 42, 1)
          Size: =15
          FontWeight: =FontWeight.Semibold

      Card2Subtitle:
        Control: Label
        Properties:
          X: =Card2Background.X + 16
          Y: =268
          Width: =Card2Background.Width - 32
          Height: =60
          Text: ="Review, approve, or reject pending change requests and budget reallocations."
          Color: =RGBA(100, 116, 139, 1)
          Size: =12

      Card2Link:
        Control: Label
        Properties:
          X: =Card2Background.X + 16
          Y: =338
          Width: =Card2Background.Width - 32
          Height: =24
          Text: ="View requests →"
          Color: =RGBA(79, 70, 229, 1)    # indigo-600
          Size: =12
          FontWeight: =FontWeight.Semibold

      Card2Button:
        Control: Button
        Properties:
          X: =Card2Background.X
          Y: =Card2Background.Y
          Width: =Card2Background.Width
          Height: =Card2Background.Height
          Text: =""
          Fill: =RGBA(0, 0, 0, 0)
          HoverFill: =RGBA(0, 0, 0, 0.03)
          BorderColor: =RGBA(0, 0, 0, 0)
          OnSelect: |
            // Navigate(ChangeRequestsScreen)
            false

      # ── Card 3 — Edit Plan ─────────────────────────────────────────
      Card3Background:
        Control: Rectangle
        Properties:
          X: =40 + ((Parent.Width - 120) / 3 + 20) * 2
          Y: =164
          Width: =(Parent.Width - 120) / 3
          Height: =200
          Fill: =RGBA(255, 255, 255, 1)
          BorderColor: =RGBA(226, 232, 240, 1)
          BorderThickness: =1
          RadiusBottomLeft: =12
          RadiusBottomRight: =12
          RadiusTopLeft: =12
          RadiusTopRight: =12

      Card3IconBg:
        Control: Rectangle
        Properties:
          X: =Card3Background.X + 16
          Y: =180
          Width: =48
          Height: =48
          Fill: =RGBA(248, 250, 252, 1)    # slate-50
          RadiusBottomLeft: =8
          RadiusBottomRight: =8
          RadiusTopLeft: =8
          RadiusTopRight: =8

      Card3Title:
        Control: Label
        Properties:
          X: =Card3Background.X + 16
          Y: =240
          Width: =Card3Background.Width - 32
          Height: =28
          Text: ="Edit Plan"
          Color: =RGBA(15, 23, 42, 1)
          Size: =15
          FontWeight: =FontWeight.Semibold

      Card3Subtitle:
        Control: Label
        Properties:
          X: =Card3Background.X + 16
          Y: =268
          Width: =Card3Background.Width - 32
          Height: =60
          Text: ="Access existing projects to update labor, travel, and material allocations."
          Color: =RGBA(100, 116, 139, 1)
          Size: =12

      Card3Link:
        Control: Label
        Properties:
          X: =Card3Background.X + 16
          Y: =338
          Width: =Card3Background.Width - 32
          Height: =24
          Text: ="Browse projects →"
          Color: =RGBA(71, 85, 105, 1)    # slate-600
          Size: =12
          FontWeight: =FontWeight.Semibold

      Card3Button:
        Control: Button
        Properties:
          X: =Card3Background.X
          Y: =Card3Background.Y
          Width: =Card3Background.Width
          Height: =Card3Background.Height
          Text: =""
          Fill: =RGBA(0, 0, 0, 0)
          HoverFill: =RGBA(0, 0, 0, 0.03)
          BorderColor: =RGBA(0, 0, 0, 0)
          OnSelect: |
            // Navigate(ProjectListScreen)
            false

      # ── System Notice banner ───────────────────────────────────────
      NoticeBanner:
        Control: Rectangle
        Properties:
          X: =40
          Y: =404
          Width: =Parent.Width - 80
          Height: =100
          Fill: =RGBA(30, 41, 59, 1)      # slate-800
          RadiusBottomLeft: =12
          RadiusBottomRight: =12
          RadiusTopLeft: =12
          RadiusTopRight: =12

      NoticeHeading:
        Control: Label
        Properties:
          X: =64
          Y: =420
          Width: =NoticeBanner.Width - 48
          Height: =24
          Text: ="System Notice"
          Color: =RGBA(255, 255, 255, 1)
          Size: =14
          FontWeight: =FontWeight.Semibold

      NoticeBody:
        Control: Label
        Properties:
          X: =64
          Y: =444
          Width: =NoticeBanner.Width - 80
          Height: =48
          Text: ="End of month financial reconciliation begins in 3 days. Please ensure all active projects have their current month labor hours submitted and approved."
          Color: =RGBA(203, 213, 225, 1)  # slate-300
          Size: =12
