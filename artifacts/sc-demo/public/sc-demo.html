<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
a{text-decoration:none;color:inherit}
table{border-collapse:collapse}
input,textarea,select{font-family:inherit;box-sizing:border-box}
button{font-family:inherit;cursor:pointer}
.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}
.tabnum{font-variant-numeric:tabular-nums}
.truncate{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
/* nav */
#top-nav{position:sticky;top:0;z-index:20;background:white;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* status badges */
.s-active  {background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.s-planning{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.s-hold    {background:#f8fafc;color:#334155;border:1px solid #cbd5e1}
.s-complete{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
/* tab */
.tab-btn{padding:10px 18px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:color .15s,border-color .15s}
.tab-btn.on{color:#1a3557;border-color:#1a3557}
.tab-btn:hover:not(.on){color:#334155;background:#f8fafc}
/* inputs */
.inp{border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;font-size:14px;outline:none;width:100%;transition:border-color .15s}
.inp:focus{border-color:#1a3557;box-shadow:0 0 0 2px rgba(26,53,87,.15)}
/* planning table editable */
.eamt{width:100%;text-align:right;background:none;border:none;cursor:pointer;font-size:13px;color:#1e293b;font-variant-numeric:tabular-nums}
.eamt:hover{text-decoration:underline dotted;text-underline-offset:2px}
.einp{width:100%;text-align:right;font-size:13px;border:1px solid #fbbf24;border-radius:4px;padding:2px 4px;font-variant-numeric:tabular-nums;outline:none;box-shadow:0 0 0 2px rgba(251,191,36,.25)}
/* modal */
.mdrop{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.45)}
.mbox{background:white;border-radius:12px;box-shadow:0 25px 50px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column;max-height:90vh}
/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1a3557;border-radius:999px;animation:spin .8s linear infinite}
/* card hover */
.ch{transition:box-shadow .15s,border-color .15s}
.ch:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
/* picker */
.pick-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px 12px;background:none;border:none;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .1s}
.pick-item:hover{background:#f8fafc}
.pick-item:last-child{border-bottom:none}
.pick-cb{flex-shrink:0;width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .1s}
/* add btn in section header */
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);cursor:pointer;transition:background .15s}
.btn-add:hover{background:rgba(255,255,255,0.25)}
</style>
</head>

function doRender(){
  const root=document.getElementById('page-root');
  const h=route;
  if(h==='/'){renderTopNav(null);renderHome(root);}
  else if(h==='/projects'){renderTopNav({crumbs:['Home','Project List'],hrefs:['/',null]});renderProjectList(root);}
  else if(/^\/projects\/\w+\/planning$/.test(h)){const id=h.split('/')[2];renderTopNavProject(id,'Planning');renderPlanning(root,id);}
  else if(/^\/projects\/\w+\/settings$/.test(h)){const id=h.split('/')[2];renderTopNavProject(id,'Settings');renderSettings(root,id);}
  else if(h==='/change-requests'){renderTopNav({crumbs:['Home','Change Requests'],hrefs:['/',null],role:'BA View'});renderCRs(root);}
  else if(/^\/change-requests\/\w+$/.test(h)){const id=h.split('/')[2];renderTopNav({crumbs:['Home','Change Requests',id],hrefs:['/','#/change-requests',null],role:'BA View'});renderCRDetail(root,id);}

  else if(h==='/setup'){renderTopNav({crumbs:['Home','Project Setup Queue'],hrefs:['/',null]});renderSetupQueue(root);}
  else if(/^\/setup\/[\w-]+$/.test(h)){const id=h.split('/')[2];renderTopNav({crumbs:['Home','Setup Queue','Setup'],hrefs:['/','setup/',null]});renderSetupForm(root,id);}
  else{root.innerHTML='<div style="padding:48px;text-align:center;color:#94a3b8">Page not found.</div>';}
}

function detailFunding(p){
  const b=p.budget; const n=p.number;
  const fy=parseInt(n.slice(0,2));
  const years=[`FY${fy-2}`,`FY${fy-1}`,`FY${fy}`];
  const plab=[Math.round(b*.10),Math.round(b*.30),Math.round(b*.27)];
  const ptrv=[Math.round(b*.00),Math.round(b*.02),Math.round(b*.01)];
  const poth=[Math.round(b*.00),Math.round(b*.10),Math.round(b*.20)];
  const rows=[{l:'Labor',v:plab},{l:'Travel',v:ptrv},{l:'OutSource / Other',v:poth}];
  const tots=years.map((_,i)=>plab[i]+ptrv[i]+poth[i]);
  const grand=tots.reduce((s,v)=>s+v,0);
  return `<div style="padding:20px;overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:420px">
    <thead><tr>
      <th style="background:#1a3557;color:white;font-weight:600;padding:8px 14px;text-align:left;border:1px solid #cbd5e1;min-width:110px">Category</th>
      ${years.map(y=>`<th style="background:#2a6496;color:white;font-weight:600;padding:8px;text-align:center;border:1px solid #cbd5e1;width:90px">${y}</th>`).join('')}

    </tr></thead>

      ${r.v.map(v=>`<td style="border:1px solid #e2e8f0;padding:8px;text-align:right;color:#475569;font-variant-numeric:tabular-nums">${v===0?'—':fmt(v)}</td>`).join('')}
      <td style="border:1px solid #e2e8f0;padding:8px;text-align:right;font-weight:600;color:#1e293b;font-variant-numeric:tabular-nums">${fmt(r.v.reduce((s,v)=>s+v,0))}</td>
    </tr>`).join('')}
    <tr style="background:rgba(26,53,87,.08)">
      <td style="border:1px solid #cbd5e1;padding:8px 14px;font-weight:700;color:#1e293b">Total</td>
      ${tots.map(v=>`<td style="border:1px solid #cbd5e1;padding:8px;text-align:right;font-weight:600;color:#1e293b;font-variant-numeric:tabular-nums">${fmt(v)}</td>`).join('')}
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right;font-weight:700;color:#0f172a;font-variant-numeric:tabular-nums">${fmt(grand)}</td>
    </tr></tbody>
  </table></div>`;
}

/* ---- Planning interactions ---- */
window.startEdit=function(btn,pid,section,id,field){
  const row=planningData[pid][section].find(r=>r.id===id);
  const td=btn.parentElement;
  const inp=document.createElement('input');
  inp.className='einp'; inp.value=row[field];
  td.replaceChild(inp,btn); inp.focus(); inp.select();
  const commit=()=>{row[field]=parseInt(inp.value.replace(/[^0-9]/g,''))||0;refreshPlan(pid);};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape')refreshPlan(pid);});
};
window.planNote=function(pid,section,id,val){const r=planningData[pid][section].find(r=>r.id===id);if(r)r.notes=val;};
window.delPlan=function(pid,section,id){planningData[pid][section]=planningData[pid][section].filter(r=>r.id!==id);refreshPlan(pid);};
window.zeroPlan=function(pid,section,id){const r=planningData[pid][section].find(r=>r.id===id);if(r){r.planned=0;r.requested=0;}refreshPlan(pid);};
window.submitPlan=function(pid){
  const p=PROJECTS.find(x=>x.id===pid);if(!p)return;
  const d=planningData[pid];const tot=[...d.labor,...d.travel,...d.mats].reduce((s,r)=>s+r.planned,0);
  const left=p.budget-tot;
  if(left>=0&&left<=50)alert('Plan submitted successfully!');
};
function refreshPlan(pid){renderPlanning(document.getElementById('page-root'),pid);}

function getSettingsFd(pid){
  if(!settingsFdData[pid]){
    const p=PROJECTS.find(x=>x.id===pid);if(!p)return null;
    const b=p.budget, baseYear=parseInt(p.number.slice(0,2),10);
    const years=[baseYear-2,baseYear-1,baseYear].map(y=>`FY${String(y).padStart(2,'0')}`);
    settingsFdData[pid]={years,
      planLabor:[Math.round(b*.10),Math.round(b*.30),Math.round(b*.27)],
      planTravel:[Math.round(b*.00),Math.round(b*.02),Math.round(b*.01)],
      planOther:[Math.round(b*.00),Math.round(b*.10),Math.round(b*.20)],
    };
  }
  return settingsFdData[pid];
}

window.setStab=function(id,tab){settingsTab[id]=tab;renderSettings(document.getElementById('page-root'),id);};
window.startSettingsEdit=function(btn,pid,arr,idx){
  const fd=getSettingsFd(pid); const a=fd[arr];
  const td=btn.parentElement;
  const inp=document.createElement('input');
  inp.className='einp'; inp.value=a[idx]; inp.style.width='100%'; inp.style.textAlign='right';
  td.replaceChild(inp,btn); inp.focus(); inp.select();
  const commit=()=>{a[idx]=parseInt(inp.value.replace(/[^0-9]/g,''))||0;renderSettings(document.getElementById('page-root'),pid);};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape')renderSettings(document.getElementById('page-root'),pid);});
};

  const statusLaborObl=planLabor.map(v=>Math.round(v*.80));

  const statusTravelObl=planTravel.map(v=>Math.round(v*.90));
  const statusOtherCom=planOther.map((v,i)=>i<years.length-1?Math.round(v*.98):Math.round(v*.60));

        <th style="padding:10px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#f1f5f9;color:#475569;border-left:1px solid #e2e8f0;width:110px">Total</th>

          ${ri===0?`<td style="padding:10px 12px;text-align:right;font-weight:600;color:#334155;background:${BCB};border-left:${BBD};font-variant-numeric:tabular-nums">${fmt(totalPlanned)}</td>

          return `<tr style="border-bottom:1px solid #e2e8f0;background:#f8fafc">
            <td style="padding:6px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase">${si===0?'Total':''}</td>
            <td style="padding:6px 12px;font-size:11px;color:#94a3b8;font-family:monospace;border-left:1px solid #e2e8f0">${sub}</td>
            ${vals.map(v=>`<td style="padding:6px 12px;text-align:right;font-weight:700;color:#1e293b;border-left:${BBD};font-variant-numeric:tabular-nums">${fmt(v)}</td>`).join('')}
            <td style="padding:6px 12px;text-align:right;font-weight:700;color:#1e293b;background:${BCB};border-left:1px solid #1e4a7a;font-variant-numeric:tabular-nums">${fmt(tot)}</td>

window.openCR=function(id){
  const cr=CRS.find(x=>x.id===id);if(!cr)return;
  const net=cr.lineItems.reduce((s,li)=>li.direction==='Increase'?s+li.amount:s-li.amount,0);
  const isActionable=cr.status!=='Approved'&&cr.status!=='Rejected';
  const typeChip=t=>t==='Labor'?'background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe':t==='Travel'?'background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe':'background:#f8fafc;color:#475569;border:1px solid #e2e8f0';
  const lineDesc=(li)=>`FY${cr.projectNumber.slice(0,2)}/SANDC ${li.type.toUpperCase()} FUNDS FOR ${cr.projectNumber}/${li.resource.toUpperCase()}/`;

  /* group by orgCode preserving insertion order */
  const groups=[];const seen=new Map();
  cr.lineItems.forEach(li=>{
    if(!seen.has(li.orgCode)){seen.set(li.orgCode,groups.length);groups.push({orgCode:li.orgCode,items:[]});}
    groups[seen.get(li.orgCode)].items.push(li);
  });

  /* build description+notes HTML per row */
  let liIdx=0;
  const groupRows=groups.map((g,gi)=>{
    const borderTop=gi>0?'border-top:2px solid #e2e8f0;':'';
    const itemRows=g.items.map(li=>{
      const delta=li.direction==='Increase'?li.amount:-li.amount;
      const desc=lineDesc(li);
      const tid=`cr-dn-${id}-${liIdx++}`;
      return `<div style="display:grid;grid-template-columns:80px 1fr 84px 84px 72px 1fr;align-items:start;padding:10px 14px;gap:10px;border-top:1px solid #f1f5f9">
        <div style="padding-top:2px"><span style="display:inline-flex;font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;${typeChip(li.type)}">${li.type}</span></div>
        <span style="font-size:13px;font-weight:500;color:#334155;padding-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${esc(li.resource)}">${esc(li.resource)}</span>
        <span style="font-size:13px;color:#64748b;text-align:right;padding-top:3px;font-variant-numeric:tabular-nums">${fmt(li.from)}</span>
        <span style="font-size:13px;font-weight:500;color:#1e293b;text-align:right;padding-top:3px;font-variant-numeric:tabular-nums">${fmt(li.to)}</span>
        <span style="font-size:13px;font-weight:600;text-align:right;padding-top:3px;font-variant-numeric:tabular-nums;color:${delta>0?'#065f46':'#dc2626'}">${delta>0?'+':''}${fmt(delta)}</span>
        <div style="padding-left:6px;display:flex;flex-direction:column;gap:4px">
          <textarea id="${tid}" rows="2" style="width:100%;font-size:11px;font-family:monospace;color:#334155;background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:5px 8px;resize:none;outline:none;line-height:1.55;min-width:180px"${!isActionable?' disabled':''} oninput="crState.rowTexts['${tid}']=this.value">${esc(desc)}</textarea>
          <button onclick="crCopyRow('${tid}')" style="align-self:flex-start;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:#94a3b8;background:none;border:none;cursor:pointer;padding:0" onmouseover="this.style.color='#334155'" onmouseout="this.style.color='#94a3b8'">${I.copy} <span id="${tid}-lbl">Copy</span></button>
        </div>
      </div>`;
    }).join('');
    return `<div style="${borderTop}">
      <div style="padding:6px 14px;background:#f1f5f9;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-family:monospace">${esc(g.orgCode)}</span>
      </div>
      ${itemRows}
    </div>`;
  }).join('');

  const mr=document.getElementById('modal-root');
  mr.innerHTML=`<div class="mdrop" onclick="closeCR()">
    <div class="mbox" style="width:min(860px,96vw)" onclick="event.stopPropagation()">

const SETUP_REQ=['pmName','dwgCoP','hqProponent','executingOrg','projectLead','needsContractSupport','startDate','endDate','primaryCmsLink','cmsGuestLink'];
function completion(p){
  const filled=SETUP_REQ.filter(f=>{const v=p[f];return v!==''&&v!==null&&v!==undefined;}).length;
  return {filled,total:SETUP_REQ.length,pct:Math.round(filled/SETUP_REQ.length*100)};
}

      <div style="padding:16px 24px;border-bottom:1px solid #e2e8f0;background:#fafafa;display:flex;align-items:center;justify-content:space-between">
        <div>
          <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0">${esc(p.number)} — ${esc(p.name)}</h2>
          <p style="font-size:12px;color:#64748b;margin:2px 0 0">Complete all required fields to enable project activation.</p>
        </div>
        <div style="text-align:right">
          <span style="font-size:14px;font-weight:700;color:${bar}">${pct}% complete</span>
          <div style="width:120px;height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden;margin-top:4px"><div style="height:100%;width:${pct}%;background:${bar};border-radius:999px;transition:width .3s"></div></div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">${filled}/${total} fields</div>
        </div>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:22px">
        <div>${sec('Project Info')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${field('Project Number','number')}${field('Project Name','name')}
          ${field('Description','description')}${field('Est. Budget','estimatedBudget')}
        </div></div>
        <div>${sec('Team')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${field('PM Name','pmName')}${field('Project Lead','projectLead')}
          ${field('HQ Proponent','hqProponent')}${field('Executing Org','executingOrg')}
          ${field('DWG / CoP','dwgCoP')}${field('Need S&C Contract Support','needsContractSupport','select',['Yes','No'])}
        </div></div>
        <div>${sec('Dates')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${field('Start Date','startDate','date')}${field('End Date','endDate','date')}
        </div></div>
        <div>${sec('CMS Links')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${field('Primary CMS Link','primaryCmsLink')}${field('CMS Guest Link','cmsGuestLink')}
          ${field('Additional CMS Links','additionalCmsLinks')}
        </div></div>
        <div style="display:flex;justify-content:flex-end;gap:12px;padding-top:8px;border-top:1px solid #f1f5f9">
          <button onclick="nav('/setup')" style="padding:10px 20px;font-size:14px;font-weight:500;color:#475569;background:white;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer">Cancel</button>
          <button onclick="saveSetup('${id}')" style="padding:10px 24px;font-size:14px;font-weight:600;color:white;background:#1a3557;border:none;border-radius:8px;cursor:pointer">Save Progress</button>
        </div>
      </div>
    </div>
  </div>`;
}
window.sedit=function(id,key,val){if(!setupEdits[id])return;setupEdits[id][key]=val;renderSetupForm(document.getElementById('page-root'),id);};
window.saveSetup=function(id){const p=SETUP_PROJECTS.find(x=>x.id===id);if(p)Object.assign(p,setupEdits[id]);alert('Progress saved!');nav('/setup');};
</script>
</body>
</html>
