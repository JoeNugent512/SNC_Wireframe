.tab-btn{padding:10px 16px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:color .15s}
.tab-btn.active{color:#1a3557;border-color:#1a3557}
.tab-btn:hover:not(.active){color:#334155;background:#f8fafc}
.field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;display:block;margin-bottom:4px}
.field-val{font-size:14px;font-weight:600;color:#1e293b}
.status-active{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.status-planning{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.status-hold{background:#f8fafc;color:#334155;border:1px solid #cbd5e1}
.status-complete{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.cr-badge-pending{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.cr-badge-review{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.cr-badge-approved{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.cr-badge-rejected{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.hdr-row th{padding:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;vertical-align:bottom;line-height:1.3}
.blue-th{color:white;background:#1a6ea8}
.amber-th{color:#78350f;background:#fef3c7}
.slate-th{color:#475569;background:#f1f5f9}
.amber-td{background:#fffbeb}
.blue-td{background:#eff6ff;text-align:right;font-variant-numeric:tabular-nums}
.foot-amber{background:#fef3c7;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.foot-blue{background:#dbeafe;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.card-hover{transition:box-shadow .15s,border-color .15s}

input[type="text"],input[type="date"],select,textarea{border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;font-size:14px;outline:none;width:100%;transition:border-color .15s}

let currentRoute = '/';
let listState = {selectedId: null, tab: 'charter', searchQ: ''};
let crSearchQ = '';
let crStatusFilter = 'All';
let crNoteTexts = {};
let setupEdits = {};

function nav(hash){
  window.location.hash = hash;
}

function route(){
  const hash = window.location.hash.replace('#','') || '/';
  currentRoute = hash;
  render();
}

window.addEventListener('hashchange', route);
window.addEventListener('load', route);

function render(){
  const h = currentRoute;
  const root = document.getElementById('page-root');
  if (h === '/') { renderNav(null); renderHome(root); }
  else if (h === '/projects') { renderNav({crumbs:['Home','Project List'],hrefs:['/',null]}); renderProjectList(root); }
  else if (h.match(/^\/projects\/(\w+)\/planning$/)) { const id=h.split('/')[2]; renderNavProject(id,'Planning'); renderPlanning(root, id); }
  else if (h.match(/^\/projects\/(\w+)\/settings$/)) { const id=h.split('/')[2]; renderNavProject(id,'Settings'); renderSettings(root, id); }
  else if (h === '/change-requests') { renderNav({crumbs:['Home','Change Requests'],hrefs:['/',null],roleBadge:'BA View'}); renderChangeRequests(root); }
  else if (h === '/setup') { renderNav({crumbs:['Home','Project Setup Queue'],hrefs:['/',null]}); renderSetupQueue(root); }

  else { root.innerHTML = '<div class="py-24 text-center text-slate-500">Page not found.</div>'; }
}

    leftAmt=`<p style="font-size:30px;font-weight:700;color:#dc2626;margin:0;font-variant-numeric:tabular-nums;line-height:1">${fmt(Math.abs(left))}</p>`;
    leftSub='<p style="font-size:11px;color:#fca5a5;margin:4px 0 0">Plan exceeds TOA</p>';
  } else {
    leftCardStyle='background:#fffbeb;border:1px solid #fca34d';
    leftLabel='<span style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#d97706">Left to Plan</span>';
    leftAmt=`<p style="font-size:30px;font-weight:700;color:#b45309;margin:0;font-variant-numeric:tabular-nums;line-height:1">${fmt(left)}</p>`;
    leftSub='<p style="font-size:11px;color:#f59e0b;margin:4px 0 0">Unallocated funds remaining</p>';
  }

  const canSubmit = left>=0 && left<=50;

  root.innerHTML=`
  <div style="display:flex;flex-direction:column;gap:20px">
    <!-- page sub-tabs -->
    <div style="display:flex;gap:0;background:white;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;padding:0;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <button onclick="nav('/projects/${id}/planning')" class="tab-btn active" style="padding:10px 20px;border-bottom:2px solid #1a3557">Planning</button>
      <button onclick="nav('/projects/${id}/settings')" class="tab-btn" style="padding:10px 20px">Settings</button>
      <button onclick="nav('/change-requests')" class="tab-btn" style="padding:10px 20px">Change Requests</button>
    </div>

    <!-- summary cards -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <div style="border-radius:16px;padding:20px 24px;background:#1a3557;box-shadow:0 4px 12px rgba(26,53,87,.35)">
        <p style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#93c5fd;margin:0 0 4px">TOA</p>
        <p style="font-size:30px;font-weight:700;color:white;margin:0;font-variant-numeric:tabular-nums;line-height:1">${fmt(p.budget)}</p>
        <p style="font-size:11px;color:#93c5fd;margin:4px 0 0">Total Obligating Authority</p>
      </div>
      <div style="border-radius:16px;padding:20px 24px;background:white;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)">
        <p style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:0 0 4px">Planned</p>
        <p id="card-planned-${id}" style="font-size:30px;font-weight:700;color:#0f172a;margin:0;font-variant-numeric:tabular-nums;line-height:1">${fmt(totalPlanned)}</p>
        <p style="font-size:11px;color:#94a3b8;margin:4px 0 0">Amount currently planned</p>
      </div>
      <div id="card-left-${id}" style="border-radius:16px;padding:20px 24px;${leftCardStyle};box-shadow:0 1px 3px rgba(0,0,0,.05)">
        ${leftLabel}${leftAmt}${leftSub}
      </div>
    </div>

    ${planSection(id,'labor','Labor','Employee / Org Code','Add Labor')}
    ${planSection(id,'travel','Travel','Organization','Add Travel')}
    ${planSection(id,'mats','Materials &amp; Other','Item','Add Item')}

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0 16px">
      <button onclick="submitPlan('${id}')" style="padding:10px 48px;font-size:14px;font-weight:600;border-radius:8px;border:none;cursor:${canSubmit?'pointer':'not-allowed'};background:${canSubmit?'#1a3557':'#e2e8f0'};color:${canSubmit?'white':'#94a3b8'};box-shadow:0 1px 3px rgba(0,0,0,.06)">Submit Plan</button>
      <p style="font-size:12px;color:#94a3b8;margin:0">${canSubmit?'':'Allocate remaining funds before submitting'}</p>
    </div>
  </div>`;
}

window.startPlanEdit = function(btn, pid, section, id, field){
  const row = planningData[pid][section].find(r=>r.id===id);
  const td = btn.parentElement;
  const inp = document.createElement('input');
  inp.className='edit-input'; inp.value=row[field];
  td.replaceChild(inp, btn);
  inp.focus(); inp.select();
  const commit=()=>{ row[field]=parseInt(inp.value.replace(/[^0-9]/g,''))||0; refreshPlanning(pid); };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape') refreshPlanning(pid); });
};
window.updatePlanNote = function(pid, section, id, val){ const r=planningData[pid][section].find(r=>r.id===id); if(r) r.notes=val; };
window.deletePlanRow = function(pid, section, id){ planningData[pid][section]=planningData[pid][section].filter(r=>r.id!==id); refreshPlanning(pid); };
window.zeroPlanRow  = function(pid, section, id){ const r=planningData[pid][section].find(r=>r.id===id); if(r){r.planned=0;r.requested=0;} refreshPlanning(pid); };
window.addPlanRow   = function(pid, section){
  const label=prompt(section==='mats'?'Item description:':section==='travel'?'Organization name:':'Employee name:');
  if(!label) return;
  const sub=section==='mats'?'':(prompt('Org code (optional):')||'');
  const p=PROJECTS.find(x=>x.id===pid); const num=p?p.number:''; const fy=num.slice(0,2);
  const pre={labor:'LABOR FUNDS',travel:'TRAVEL',mats:'MATL'}[section];
  planningData[pid][section].push({id:uid(),label,sub,planned:0,requested:0,tc:0,oc:0,ob:0,desc:`FY${fy}/SANDC ${pre} FOR ${num}/${label}/`,notes:''});
  refreshPlanning(pid);
};
window.submitPlan = function(pid){
  const p=PROJECTS.find(x=>x.id===pid); if(!p) return;
  const d=planningData[pid]; const total=[...d.labor,...d.travel,...d.mats].reduce((s,r)=>s+r.planned,0);
  const left=p.budget-total;
  if(left>=0&&left<=50){ alert('Plan submitted successfully!'); }
};

function refreshPlanning(pid){
  renderPlanning(document.getElementById('page-root'), pid);
}

let settingsTab = {};
let settingsFundingData = {};

function getSettingsFundingData(pid){
  if(!settingsFundingData[pid]){
    const p=PROJECTS.find(x=>x.id===pid); if(!p) return null;
    const b=p.budget;
    const baseYear=parseInt(p.number.slice(0,2),10);
    const years=[baseYear-2,baseYear-1,baseYear].map(y=>`FY${String(y).padStart(2,'0')}`);
    settingsFundingData[pid]={
      years,
      planLabor:[Math.round(b*.10),Math.round(b*.30),Math.round(b*.27)],
      planTravel:[Math.round(b*.00),Math.round(b*.02),Math.round(b*.01)],
      planOther:[Math.round(b*.00),Math.round(b*.10),Math.round(b*.20)],
    };
  }
  return settingsFundingData[pid];
}

function renderSettings(root, id){
  const p = PROJECTS.find(x=>x.id===id);
  if(!p){ root.innerHTML='<p style="text-align:center;padding:48px;color:#94a3b8">Project not found.</p>'; return; }
  const tab = settingsTab[id]||'charter';

  const tabs=[{id:'charter',label:'Charter'},{id:'funding',label:'Funding'},{id:'schedule',label:'Schedule'}];
  let body='';
  if(tab==='charter') body=renderSettingsCharter(p);
  else if(tab==='funding') body=renderSettingsFunding(p);
  else body=renderSettingsSchedule(p);

  root.innerHTML=`
  <div style="max-width:900px;margin:0 auto">
    <div style="background:white;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <div style="padding:16px 24px;border-bottom:1px solid #e2e8f0;background:#fafafa;display:flex;align-items:center;justify-content:space-between">
        <div>
          <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0">${esc(p.number)} — ${esc(p.name)}</h2>
          <p style="font-size:12px;color:#64748b;margin:2px 0 0">Enterprise Project Management Plan (EPMP)</p>
        </div>
        <button onclick="nav('/projects/${id}/planning')" style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:#64748b;background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:6px" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">${I.back} Back to Plan</button>
      </div>
      <div style="display:flex;border-bottom:1px solid #e2e8f0">
        ${tabs.map(t=>`<button class="tab-btn ${tab===t.id?'active':''}" onclick="setSettingsTab('${id}','${t.id}')" style="flex:1;text-align:center">${t.label}</button>`).join('')}
      </div>
      <div>${body}</div>
    </div>
  </div>`;
}

function renderSettingsFunding(p){
  const fd=getSettingsFundingData(p.id);
  const {years,planLabor,planTravel,planOther}=fd;
  const planTotals=years.map((_,i)=>planLabor[i]+planTravel[i]+planOther[i]);
  const totalPlanned=planTotals.reduce((s,v)=>s+v,0);
  const leftToPlan=p.budget-totalPlanned;

  const statusLaborCom=planLabor.map(v=>Math.round(v*.95));
  const statusLaborObl=planLabor.map(v=>Math.round(v*.80));
  const statusTravelCom=planTravel.map(v=>Math.round(v*1));
  const statusTravelObl=planTravel.map(v=>Math.round(v*.90));
  const statusOtherCom=planOther.map((v,i)=>i<years.length-1?Math.round(v*.98):Math.round(v*.60));
  const statusOtherObl=planOther.map((v,i)=>i<years.length-1?Math.round(v*.95):Math.round(v*.40));
  const totalPlan=years.map((_,i)=>planLabor[i]+planTravel[i]+planOther[i]);
  const totalCom=years.map((_,i)=>statusLaborCom[i]+statusTravelCom[i]+statusOtherCom[i]);
  const totalObl=years.map((_,i)=>statusLaborObl[i]+statusTravelObl[i]+statusOtherObl[i]);
  const atc=years.map((_,i)=>totalCom[i]-totalObl[i]);
  const auob=years.map((_,i)=>totalPlan[i]-totalCom[i]);

  const cell=(v,editable,pid,arr,i)=>editable
    ?`<button class="editable-amt" style="text-align:right" onclick="startSettingsEdit(this,'${pid}','${arr}',${i})">${v===0?'—':fmt(v)}</button>`
    :`<span class="tabnum">${v===0?'—':fmt(v)}</span>`;

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:24px;overflow-x:auto">
  <!-- Plan table -->
  <div style="border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)">
    <div style="padding:12px 20px;background:#1a3557;display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:700;color:white;font-size:14px">Project Funding Plan</span>
      <span style="font-size:12px;color:#93c5fd">Approved Budget: ${fmt(p.budget)}</span>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="border-bottom:1px solid #e2e8f0">
        <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#64748b;background:#f8fafc;min-width:120px">Category</th>
        ${years.map(y=>`<th style="padding:10px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#fffbeb;color:#92400e;border-left:1px solid #fcd34d;width:110px">${y}</th>`).join('')}
        <th style="padding:10px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#f1f5f9;color:#475569;border-left:1px solid #e2e8f0;width:110px">Total</th>
        <th style="padding:10px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#1a6ea8;color:white;border-left:1px solid #bfdbfe;width:110px">Total Planned</th>
        <th style="padding:10px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;background:#1a6ea8;color:white;border-left:1px solid #bfdbfe;width:110px">Left to Plan</th>
      </tr></thead>
      <tbody>
        ${[{label:'Labor',arr:'planLabor',vals:planLabor},{label:'Travel',arr:'planTravel',vals:planTravel},{label:'OutSource / Other',arr:'planOther',vals:planOther}].map((row,ri)=>`
        <tr style="border-bottom:1px solid #fef9c3">

window.startSettingsEdit = function(btn, pid, arrName, idx){
  const fd=getSettingsFundingData(pid);
  const arr=fd[arrName];
  const td=btn.parentElement;
  const inp=document.createElement('input');
  inp.className='edit-input'; inp.value=arr[idx];
  td.replaceChild(inp, btn);
  inp.focus(); inp.select();
  const commit=()=>{ arr[idx]=parseInt(inp.value.replace(/[^0-9]/g,''))||0; renderSettings(document.getElementById('page-root'),pid); };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape') renderSettings(document.getElementById('page-root'),pid); });
};

const REQUIRED_FIELDS=['pmName','dwgCoP','hqProponent','executingOrg','projectLead','needsContractSupport','startDate','endDate','primaryCmsLink','cmsGuestLink'];

function completionOf(p){
  const filled=REQUIRED_FIELDS.filter(f=>{const v=p[f];return v!==''&&v!==null&&v!==undefined;}).length;
  return {filled,total:REQUIRED_FIELDS.length,pct:Math.round(filled/REQUIRED_FIELDS.length*100)};
}

  <div style="max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:24px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:8px;background:#fffbeb;border:1px solid #fde68a;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${I.clip}
      </div>
      <div>
        <h2 style="font-size:20px;font-weight:700;color:#0f172a;margin:0">Project Setup Queue</h2>
        <p style="font-size:14px;color:#64748b;margin:2px 0 0">Projects recently picked up that require a BA to complete the EPMP charter data.</p>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${SETUP_PROJECTS.map(p=>{
        const {filled,total,pct}=completionOf(p);
        const missing=total-filled;
        const col=pct===100?'#059669':pct>=50?'#d97706':'#dc2626';
        const barCol=pct===100?'#10b981':pct>=50?'#f59e0b':'#ef4444';
        return `<div onclick="nav('/setup/${p.id}')" class="card-hover" style="background:white;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);padding:20px;display:flex;align-items:center;gap:20px;cursor:pointer">
          <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;width:56px">
            <span style="font-size:18px;font-weight:700;color:${col}">${pct}%</span>
            <div style="width:56px;height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${barCol};border-radius:999px"></div>
            </div>
            <span style="font-size:10px;color:#94a3b8">${filled}/${total}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <span style="font-family:monospace;font-size:12px;font-weight:700;color:#64748b">${esc(p.number)}</span>
              ${missing>0?`<span style="font-size:10px;font-weight:600;background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:4px">${I.alert} ${missing} field${missing!==1?'s':''} missing</span>`:''}
            </div>
            <div style="font-weight:600;color:#0f172a;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(p.name)}</div>
            <div style="font-size:13px;color:#64748b;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(p.description)}</div>
            <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#94a3b8">
              <span>Est. ${fmt(p.estimatedBudget)}</span>
              <span>Received ${fmtDate(p.receivedDate)}</span>
              <span>Source: <span style="font-family:monospace">${esc(p.sourceRef)}</span></span>
            </div>
          </div>
          <div style="flex-shrink:0;color:#94a3b8">${I.arrow}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ============================================================ */
/*  PROJECT SETUP FORM                                           */
/* ============================================================ */
function renderProjectSetup(root, id){
  const base=SETUP_PROJECTS.find(x=>x.id===id);
  if(!base){ root.innerHTML='<p style="text-align:center;padding:48px;color:#94a3b8">Project not found.</p>'; return; }
  if(!setupEdits[id]) setupEdits[id]={...base};
  const p=setupEdits[id];
  const {filled,total,pct}=completionOf(p);
  const barCol=pct===100?'#10b981':pct>=50?'#f59e0b':'#ef4444';

  const field=(label,key,type='text',opts)=>{
    const val=esc(p[key]||'');
    if(type==='select'){
      return `<div><div class="field-label">${label}</div>
        <select onchange="setupEdit('${id}','${key}',this.value)" style="height:38px">
          <option value="">Select…</option>
          ${(opts||[]).map(o=>`<option value="${o}" ${p[key]===o?'selected':''}>${o}</option>`).join('')}
        </select></div>`;
    }
    return `<div><div class="field-label">${label}</div>
      <input type="${type}" value="${val}" onchange="setupEdit('${id}','${key}',this.value)" style="height:38px"/></div>`;
  };

  root.innerHTML=`
  <div style="max-width:800px;margin:0 auto">
    <div style="background:white;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <div style="padding:16px 24px;border-bottom:1px solid #e2e8f0;background:#fafafa;display:flex;align-items:center;justify-content:space-between">
        <div>
          <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0">${esc(p.number)} — ${esc(p.name)}</h2>
          <p style="font-size:12px;color:#64748b;margin:2px 0 0">Complete all required fields to enable project activation.</p>
        </div>
        <div style="text-align:right">
          <span style="font-size:14px;font-weight:700;color:${barCol}">${pct}% complete</span>
          <div style="width:120px;height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden;margin-top:4px">
            <div style="height:100%;width:${pct}%;background:${barCol};border-radius:999px;transition:width .3s"></div>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">${filled}/${total} fields</div>
        </div>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:24px">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;display:flex;align-items:center;gap:8px;margin-bottom:16px">Project Info <div style="flex:1;height:1px;background:#f1f5f9"></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            ${field('Project Number','number')}
            ${field('Project Name','name')}
            ${field('Description (brief)','description')}
            ${field('Est. Budget','estimatedBudget')}
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;display:flex;align-items:center;gap:8px;margin-bottom:16px">Team <div style="flex:1;height:1px;background:#f1f5f9"></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            ${field('PM Name','pmName')}
            ${field('Project Lead','projectLead')}
            ${field('HQ Proponent','hqProponent')}
            ${field('Executing Org','executingOrg')}
            ${field('DWG / CoP','dwgCoP')}
            ${field('Need S&C Contract Support','needsContractSupport','select',['Yes','No'])}
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;display:flex;align-items:center;gap:8px;margin-bottom:16px">Dates <div style="flex:1;height:1px;background:#f1f5f9"></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            ${field('Start Date','startDate','date')}
            ${field('End Date','endDate','date')}
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;display:flex;align-items:center;gap:8px;margin-bottom:16px">CMS Links <div style="flex:1;height:1px;background:#f1f5f9"></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            ${field('Primary CMS Link','primaryCmsLink')}
            ${field('CMS Guest Link','cmsGuestLink')}
            ${field('Additional CMS Links','additionalCmsLinks')}
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:12px;padding-top:8px;border-top:1px solid #f1f5f9">
          <button onclick="nav('/setup')" style="padding:10px 20px;font-size:14px;font-weight:500;color:#475569;background:white;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer">Cancel</button>
          <button onclick="saveSetup('${id}')" style="padding:10px 24px;font-size:14px;font-weight:600;color:white;background:#1a3557;border:none;border-radius:8px;cursor:pointer">Save Progress</button>
        </div>
      </div>
    </div>
  </div>`;
}

window.setupEdit = function(id, key, val){
  if(!setupEdits[id]) return;
  setupEdits[id][key]=val;
  renderProjectSetup(document.getElementById('page-root'), id);
};
window.saveSetup = function(id){
  const p=SETUP_PROJECTS.find(x=>x.id===id);
  if(p) Object.assign(p, setupEdits[id]);
  alert('Progress saved!');
  nav('/setup');
};
</script>
</body>
</html>
